<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刷题 - 学霸助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .nav-blur { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    .option-btn { transition: all 0.2s ease; }
    .option-btn:hover:not(.correct):not(.wrong) { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }
    .option-btn.selected { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.2); }
    .option-btn.correct { border-color: #22c55e; background: rgba(34, 197, 94, 0.2); }
    .option-btn.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.2); }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  
  <!-- Navigation -->
  <nav class="nav-blur fixed top-0 left-0 right-0 z-50 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="flex items-center space-x-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
            <i class="fas fa-graduation-cap text-lg"></i>
          </div>
          <span class="font-bold text-xl">学霸助手</span>
        </a>
        <div class="hidden md:flex items-center space-x-1">
          <a href="index.html" class="px-4 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/5 text-sm font-medium transition">首页</a>
          <a href="practice.html" class="px-4 py-2 rounded-lg bg-white/10 text-sm font-medium">刷题</a>
          <a href="wrong.html" class="px-4 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/5 text-sm font-medium transition">错题本</a>
          <a href="bank.html" class="px-4 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/5 text-sm font-medium transition">题库</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-24 pb-12 px-4 max-w-3xl mx-auto">
    
    <!-- Bank Selection View -->
    <div id="selectView">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold mb-2">开始刷题</h1>
        <p class="text-slate-400">选择题库开始练习</p>
      </div>
      
      <div class="glass rounded-2xl p-6">
        <div id="bankCheckboxes" class="space-y-3 mb-6">
          <!-- Filled by JS -->
        </div>
        
        <div id="noBanksMsg" class="hidden text-center py-8">
          <i class="fas fa-folder-open text-4xl text-slate-600 mb-4"></i>
          <p class="text-slate-400 mb-4">还没有题库</p>
          <a href="index.html" class="text-purple-400 hover:text-purple-300">返回首页快速生成练习</a>
        </div>

        <div class="flex items-center gap-4 mb-6 text-sm">
          <label class="flex items-center gap-2 text-slate-300">
            <input type="checkbox" id="shuffleQuestions" checked class="rounded bg-slate-800 border-slate-600">
            随机顺序
          </label>
        </div>

        <button id="startPracticeBtn" onclick="startPractice()" class="w-full py-4 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 font-semibold text-lg hover:opacity-90 transition disabled:opacity-50" disabled>
          <i class="fas fa-play mr-2"></i>开始刷题
        </button>
      </div>
    </div>

    <!-- Practice View -->
    <div id="practiceView" class="hidden">
      
      <!-- Progress Bar -->
      <div class="glass rounded-2xl p-4 mb-6">
        <div class="flex justify-between items-center mb-3">
          <span class="text-slate-400 text-sm">进度</span>
          <span class="font-medium"><span id="currentIndex">1</span> / <span id="totalCount">0</span></span>
        </div>
        <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
          <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-600 transition-all duration-300" style="width: 0%"></div>
        </div>
        <div class="flex justify-between text-sm mt-3">
          <span class="text-emerald-400"><i class="fas fa-check mr-1"></i><span id="correctCount">0</span> 正确</span>
          <span class="text-rose-400"><i class="fas fa-times mr-1"></i><span id="wrongCount">0</span> 错误</span>
        </div>
      </div>

      <!-- Question Card -->
      <div class="glass rounded-2xl p-6 mb-6">
        <div class="flex justify-between items-start mb-4">
          <div class="flex gap-2">
            <span id="questionType" class="px-3 py-1 rounded-full text-xs font-medium bg-purple-500/20 text-purple-300"></span>
            <span id="questionDifficulty" class="px-3 py-1 rounded-full text-xs font-medium"></span>
          </div>
          <span class="text-slate-500 text-sm">#<span id="questionNumber">1</span></span>
        </div>
        
        <p id="questionText" class="text-xl mb-6 leading-relaxed"></p>

        <!-- Choice Options -->
        <div id="choiceOptions" class="space-y-3 mb-4"></div>

        <!-- Text Input -->
        <div id="textInput" class="hidden mb-4">
          <input type="text" id="answerInput" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-purple-500" placeholder="输入你的答案...">
        </div>

        <!-- True/False Buttons -->
        <div id="tfButtons" class="hidden grid grid-cols-2 gap-4 mb-4">
          <button onclick="selectTF('正确')" class="option-btn py-4 rounded-xl border border-slate-700 font-medium" data-value="正确">
            <i class="fas fa-check mr-2 text-emerald-400"></i>正确
          </button>
          <button onclick="selectTF('错误')" class="option-btn py-4 rounded-xl border border-slate-700 font-medium" data-value="错误">
            <i class="fas fa-times mr-2 text-rose-400"></i>错误
          </button>
        </div>

        <!-- Submit Button -->
        <button id="submitAnswerBtn" onclick="submitAnswer()" class="w-full py-4 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 font-semibold hover:opacity-90 transition">
          确认答案
        </button>

        <!-- Result Section -->
        <div id="resultSection" class="hidden mt-6">
          <div id="resultBanner" class="p-4 rounded-xl mb-4">
            <div class="flex items-center">
              <i id="resultIcon" class="text-3xl mr-4"></i>
              <div>
                <div id="resultText" class="font-semibold text-lg"></div>
                <div id="correctAnswer" class="text-sm opacity-80"></div>
              </div>
            </div>
          </div>
          <div class="bg-slate-800/50 rounded-xl p-4">
            <div class="text-slate-400 text-sm mb-2">解析</div>
            <p id="explanationText" class="text-slate-200"></p>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <div class="flex gap-4">
        <button id="prevBtn" onclick="prevQuestion()" class="flex-1 py-3 rounded-xl border border-slate-700 font-medium hover:bg-slate-800 transition disabled:opacity-50" disabled>
          <i class="fas fa-arrow-left mr-2"></i>上一题
        </button>
        <button id="nextBtn" onclick="nextQuestion()" class="flex-1 py-3 rounded-xl bg-purple-600 font-medium hover:bg-purple-700 transition">
          下一题<i class="fas fa-arrow-right ml-2"></i>
        </button>
      </div>
    </div>

    <!-- Complete View -->
    <div id="completeView" class="hidden">
      <div class="glass rounded-2xl p-8 text-center">
        <div class="w-20 h-20 rounded-full bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center mx-auto mb-6">
          <i class="fas fa-check text-4xl"></i>
        </div>
        <h2 class="text-3xl font-bold mb-2">练习完成！</h2>
        <p class="text-slate-400 mb-8">继续加油！</p>
        
        <div class="grid grid-cols-3 gap-4 mb-8">
          <div class="bg-slate-800/50 rounded-xl p-4">
            <div class="text-3xl font-bold text-indigo-400" id="finalTotal">0</div>
            <div class="text-slate-400 text-sm">总题数</div>
          </div>
          <div class="bg-slate-800/50 rounded-xl p-4">
            <div class="text-3xl font-bold text-emerald-400" id="finalCorrect">0</div>
            <div class="text-slate-400 text-sm">正确</div>
          </div>
          <div class="bg-slate-800/50 rounded-xl p-4">
            <div class="text-3xl font-bold text-amber-400" id="finalAccuracy">0%</div>
            <div class="text-slate-400 text-sm">正确率</div>
          </div>
        </div>

        <div class="flex gap-4">
          <button onclick="resetPractice()" class="flex-1 py-3 rounded-xl border border-slate-700 font-medium hover:bg-slate-800 transition">
            <i class="fas fa-redo mr-2"></i>再来一次
          </button>
          <a href="wrong.html" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-rose-500 to-pink-600 font-medium hover:opacity-90 transition text-center">
            <i class="fas fa-book mr-2"></i>查看错题
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    let questions = [];
    let currentIndex = 0;
    let userAnswers = {};
    let correctCount = 0;
    let wrongCount = 0;
    let selectedAnswer = '';
    let answered = false;

    const urlParams = new URLSearchParams(window.location.search);
    const preselectedBank = urlParams.get('bank');
    const autoStart = urlParams.get('auto') === 'true';

    function loadBankCheckboxes() {
      const banks = Storage.getBanks();
      const bankList = Object.values(banks).filter(b => b.questions && b.questions.length > 0);
      
      if (bankList.length === 0) {
        document.getElementById('bankCheckboxes').classList.add('hidden');
        document.getElementById('noBanksMsg').classList.remove('hidden');
        return;
      }

      document.getElementById('bankCheckboxes').innerHTML = bankList.map(bank => `
        <label class="flex items-center gap-4 p-4 rounded-xl border border-slate-700 cursor-pointer hover:border-purple-500/50 transition ${preselectedBank === bank.id ? 'border-purple-500 bg-purple-500/10' : ''}">
          <input type="checkbox" class="bank-checkbox rounded bg-slate-800 border-slate-600 text-purple-500" value="${bank.id}" 
            ${preselectedBank === bank.id ? 'checked' : ''}
            onchange="updateStartButton()">
          <div class="flex-1">
            <div class="font-medium">${escapeHtml(bank.name)}</div>
            <div class="text-sm text-slate-400">${bank.questions?.length || 0} 道题</div>
          </div>
        </label>
      `).join('');

      updateStartButton();
      
      // Auto-start if specified
      if (autoStart && preselectedBank) {
        setTimeout(() => startPractice(), 100);
      }
    }

    function updateStartButton() {
      const checked = document.querySelectorAll('.bank-checkbox:checked');
      document.getElementById('startPracticeBtn').disabled = checked.length === 0;
    }

    function startPractice() {
      const checkedBanks = document.querySelectorAll('.bank-checkbox:checked');
      const bankIds = Array.from(checkedBanks).map(cb => cb.value);
      
      questions = [];
      bankIds.forEach(bankId => {
        const bank = Storage.getBank(bankId);
        if (bank && bank.questions) {
          questions = questions.concat(bank.questions);
        }
      });

      if (questions.length === 0) {
        alert('所选题库没有题目');
        return;
      }

      if (document.getElementById('shuffleQuestions').checked) {
        questions = shuffleArray(questions);
      }

      currentIndex = 0;
      userAnswers = {};
      correctCount = 0;
      wrongCount = 0;

      document.getElementById('selectView').classList.add('hidden');
      document.getElementById('practiceView').classList.remove('hidden');
      document.getElementById('totalCount').textContent = questions.length;

      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentIndex];
      answered = false;
      selectedAnswer = '';

      document.getElementById('currentIndex').textContent = currentIndex + 1;
      document.getElementById('questionNumber').textContent = currentIndex + 1;
      document.getElementById('progressBar').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
      document.getElementById('correctCount').textContent = correctCount;
      document.getElementById('wrongCount').textContent = wrongCount;

      const typeLabels = { choice: '选择题', blank: '填空题', truefalse: '判断题' };
      const difficultyLabels = { easy: '简单', medium: '中等', hard: '困难' };
      const difficultyColors = { easy: 'bg-emerald-500/20 text-emerald-300', medium: 'bg-amber-500/20 text-amber-300', hard: 'bg-rose-500/20 text-rose-300' };

      document.getElementById('questionType').textContent = typeLabels[q.type] || '未知';
      document.getElementById('questionDifficulty').textContent = difficultyLabels[q.difficulty] || '中等';
      document.getElementById('questionDifficulty').className = `px-3 py-1 rounded-full text-xs font-medium ${difficultyColors[q.difficulty] || difficultyColors.medium}`;
      document.getElementById('questionText').textContent = q.question;

      const choiceOptions = document.getElementById('choiceOptions');
      const textInput = document.getElementById('textInput');
      const tfButtons = document.getElementById('tfButtons');

      choiceOptions.classList.add('hidden');
      textInput.classList.add('hidden');
      tfButtons.classList.add('hidden');

      if (q.type === 'choice') {
        choiceOptions.classList.remove('hidden');
        choiceOptions.innerHTML = (q.options || []).map((opt, i) => `
          <button onclick="selectOption('${String.fromCharCode(65 + i)}')" 
            class="option-btn w-full text-left p-4 rounded-xl border border-slate-700 flex items-center gap-4" data-value="${String.fromCharCode(65 + i)}">
            <span class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center font-semibold">${String.fromCharCode(65 + i)}</span>
            <span class="flex-1">${escapeHtml(opt)}</span>
          </button>
        `).join('');
      } else if (q.type === 'blank') {
        textInput.classList.remove('hidden');
        document.getElementById('answerInput').value = '';
      } else if (q.type === 'truefalse') {
        tfButtons.classList.remove('hidden');
        document.querySelectorAll('#tfButtons .option-btn').forEach(btn => btn.classList.remove('selected'));
      }

      document.getElementById('submitAnswerBtn').classList.remove('hidden');
      document.getElementById('resultSection').classList.add('hidden');
      document.getElementById('prevBtn').disabled = currentIndex === 0;
      document.getElementById('nextBtn').innerHTML = currentIndex === questions.length - 1 
        ? '完成练习<i class="fas fa-flag-checkered ml-2"></i>'
        : '下一题<i class="fas fa-arrow-right ml-2"></i>';
    }

    function selectOption(value) {
      if (answered) return;
      selectedAnswer = value;
      document.querySelectorAll('#choiceOptions .option-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === value);
      });
    }

    function selectTF(value) {
      if (answered) return;
      selectedAnswer = value;
      document.querySelectorAll('#tfButtons .option-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === value);
      });
    }

    function submitAnswer() {
      const q = questions[currentIndex];
      
      if (q.type === 'blank') {
        selectedAnswer = document.getElementById('answerInput').value.trim();
      }

      if (!selectedAnswer) {
        alert('请选择或输入答案');
        return;
      }

      answered = true;
      userAnswers[q.id] = selectedAnswer;

      const isCorrect = selectedAnswer.trim().toLowerCase() === (q.answer || '').trim().toLowerCase();
      
      if (isCorrect) {
        correctCount++;
      } else {
        wrongCount++;
        Storage.addWrongAnswer(q, selectedAnswer);
      }

      Storage.updateStats({ totalPracticed: 1, totalCorrect: isCorrect ? 1 : 0 });
      showResult(isCorrect, q);
    }

    function showResult(isCorrect, question) {
      document.getElementById('submitAnswerBtn').classList.add('hidden');
      document.getElementById('resultSection').classList.remove('hidden');

      const resultBanner = document.getElementById('resultBanner');
      const resultIcon = document.getElementById('resultIcon');
      const resultText = document.getElementById('resultText');

      if (isCorrect) {
        resultBanner.className = 'p-4 rounded-xl mb-4 bg-emerald-500/20 text-emerald-300';
        resultIcon.className = 'fas fa-check-circle text-3xl mr-4';
        resultText.textContent = '回答正确！';
      } else {
        resultBanner.className = 'p-4 rounded-xl mb-4 bg-rose-500/20 text-rose-300';
        resultIcon.className = 'fas fa-times-circle text-3xl mr-4';
        resultText.textContent = '回答错误';
      }

      document.getElementById('correctAnswer').textContent = `正确答案：${question.answer}`;
      document.getElementById('explanationText').textContent = question.explanation || '暂无解析';

      if (question.type === 'choice') {
        document.querySelectorAll('#choiceOptions .option-btn').forEach(btn => {
          if (btn.dataset.value === question.answer) {
            btn.classList.add('correct');
          } else if (btn.dataset.value === selectedAnswer && !isCorrect) {
            btn.classList.add('wrong');
          }
        });
      }

      document.getElementById('correctCount').textContent = correctCount;
      document.getElementById('wrongCount').textContent = wrongCount;
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        showQuestion();
      }
    }

    function nextQuestion() {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        showQuestion();
      } else {
        showComplete();
      }
    }

    function showComplete() {
      document.getElementById('practiceView').classList.add('hidden');
      document.getElementById('completeView').classList.remove('hidden');

      document.getElementById('finalTotal').textContent = questions.length;
      document.getElementById('finalCorrect').textContent = correctCount;
      document.getElementById('finalAccuracy').textContent = Math.round((correctCount / questions.length) * 100) + '%';
    }

    function resetPractice() {
      document.getElementById('completeView').classList.add('hidden');
      document.getElementById('selectView').classList.remove('hidden');
      questions = [];
      currentIndex = 0;
      userAnswers = {};
      correctCount = 0;
      wrongCount = 0;
    }

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadBankCheckboxes();
  </script>
</body>
</html>
